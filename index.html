<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Two Player Ping Pong</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #14213d, #0b1020 60%);
      color: #f8fafc;
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrapper {
      width: min(92vw, 900px);
      text-align: center;
    }

    h1 {
      margin-bottom: 0.5rem;
      font-size: clamp(1.5rem, 2.5vw, 2.2rem);
      letter-spacing: 0.04em;
    }

    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 0.75rem;
      font-size: 1.1rem;
      font-weight: 700;
    }

    canvas {
      width: min(92vw, 900px);
      height: auto;
      border: 4px solid #94a3b8;
      background: #0f172a;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      display: block;
      margin: 0 auto;
    }

    .controls {
      margin-top: 0.9rem;
      opacity: 0.9;
      line-height: 1.5;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <h1>Two Player Ping Pong</h1>
    <div class="scoreboard">
      <div>Player 1: <span id="scoreLeft">0</span></div>
      <div>Player 2: <span id="scoreRight">0</span></div>
    </div>
    <canvas id="game" width="900" height="500" aria-label="Ping pong game"></canvas>
    <p class="controls">
      Player 1: <strong>W</strong> / <strong>S</strong> &nbsp;|&nbsp;
      Player 2: <strong>↑</strong> / <strong>↓</strong><br />
      First to 7 points wins. Press <strong>R</strong> to restart.
    </p>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreLeftEl = document.getElementById("scoreLeft");
    const scoreRightEl = document.getElementById("scoreRight");

    const PADDLE_WIDTH = 14;
    const PADDLE_HEIGHT = 100;
    const BALL_SIZE = 14;
    const PADDLE_SPEED = 7;
    const WIN_SCORE = 7;

    const leftPaddle = {
      x: 22,
      y: canvas.height / 2 - PADDLE_HEIGHT / 2,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      dy: 0,
    };

    const rightPaddle = {
      x: canvas.width - 22 - PADDLE_WIDTH,
      y: canvas.height / 2 - PADDLE_HEIGHT / 2,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      dy: 0,
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      size: BALL_SIZE,
      speed: 5,
      dx: 5,
      dy: 3,
    };

    let scoreLeft = 0;
    let scoreRight = 0;
    let gameOver = false;

    function clampPaddle(paddle) {
      if (paddle.y < 0) paddle.y = 0;
      if (paddle.y + paddle.height > canvas.height) {
        paddle.y = canvas.height - paddle.height;
      }
    }

    function resetBall(direction = 1) {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.speed = 5;
      ball.dx = direction * ball.speed;
      ball.dy = (Math.random() * 4 - 2) || 2;
    }

    function resetGame() {
      scoreLeft = 0;
      scoreRight = 0;
      gameOver = false;
      leftPaddle.y = canvas.height / 2 - PADDLE_HEIGHT / 2;
      rightPaddle.y = canvas.height / 2 - PADDLE_HEIGHT / 2;
      updateScore();
      resetBall(Math.random() > 0.5 ? 1 : -1);
    }

    function updateScore() {
      scoreLeftEl.textContent = scoreLeft;
      scoreRightEl.textContent = scoreRight;
    }

    function drawCenterLine() {
      ctx.setLineDash([10, 14]);
      ctx.strokeStyle = "#475569";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawRect(obj, color = "#f8fafc") {
      ctx.fillStyle = color;
      ctx.fillRect(obj.x, obj.y, obj.width || obj.size, obj.height || obj.size);
    }

    function drawText(text, y, size = 38) {
      ctx.fillStyle = "#f8fafc";
      ctx.font = `700 ${size}px Arial`;
      ctx.textAlign = "center";
      ctx.fillText(text, canvas.width / 2, y);
    }

    function collide(paddle) {
      return (
        ball.x < paddle.x + paddle.width &&
        ball.x + ball.size > paddle.x &&
        ball.y < paddle.y + paddle.height &&
        ball.y + ball.size > paddle.y
      );
    }

    function update() {
      if (gameOver) return;

      leftPaddle.y += leftPaddle.dy;
      rightPaddle.y += rightPaddle.dy;
      clampPaddle(leftPaddle);
      clampPaddle(rightPaddle);

      ball.x += ball.dx;
      ball.y += ball.dy;

      if (ball.y <= 0 || ball.y + ball.size >= canvas.height) {
        ball.dy *= -1;
      }

      if (collide(leftPaddle) && ball.dx < 0) {
        const impact = (ball.y + ball.size / 2 - (leftPaddle.y + leftPaddle.height / 2)) / (leftPaddle.height / 2);
        ball.speed = Math.min(ball.speed + 0.35, 11);
        ball.dx = Math.abs(ball.speed);
        ball.dy = impact * 5;
        ball.x = leftPaddle.x + leftPaddle.width;
      }

      if (collide(rightPaddle) && ball.dx > 0) {
        const impact = (ball.y + ball.size / 2 - (rightPaddle.y + rightPaddle.height / 2)) / (rightPaddle.height / 2);
        ball.speed = Math.min(ball.speed + 0.35, 11);
        ball.dx = -Math.abs(ball.speed);
        ball.dy = impact * 5;
        ball.x = rightPaddle.x - ball.size;
      }

      if (ball.x + ball.size < 0) {
        scoreRight += 1;
        updateScore();
        if (scoreRight >= WIN_SCORE) gameOver = true;
        resetBall(-1);
      } else if (ball.x > canvas.width) {
        scoreLeft += 1;
        updateScore();
        if (scoreLeft >= WIN_SCORE) gameOver = true;
        resetBall(1);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawCenterLine();
      drawRect(leftPaddle, "#38bdf8");
      drawRect(rightPaddle, "#f97316");
      drawRect(ball, "#f8fafc");

      if (gameOver) {
        const winner = scoreLeft > scoreRight ? "Player 1 Wins!" : "Player 2 Wins!";
        drawText(winner, canvas.height / 2 - 10);
        drawText("Press R to play again", canvas.height / 2 + 40, 24);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (event) => {
      switch (event.key) {
        case "w":
        case "W":
          leftPaddle.dy = -PADDLE_SPEED;
          break;
        case "s":
        case "S":
          leftPaddle.dy = PADDLE_SPEED;
          break;
        case "ArrowUp":
          rightPaddle.dy = -PADDLE_SPEED;
          break;
        case "ArrowDown":
          rightPaddle.dy = PADDLE_SPEED;
          break;
        case "r":
        case "R":
          resetGame();
          break;
      }
    });

    window.addEventListener("keyup", (event) => {
      if (["w", "W", "s", "S"].includes(event.key)) {
        leftPaddle.dy = 0;
      }
      if (["ArrowUp", "ArrowDown"].includes(event.key)) {
        rightPaddle.dy = 0;
      }
    });

    updateScore();
    resetBall(Math.random() > 0.5 ? 1 : -1);
    loop();
  </script>
</body>
</html>
